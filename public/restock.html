<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DFD Supply Inventory · Restock Inventory</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body data-page="restock">
    <div class="shell">
      <header class="hero">
        <div>
          <p class="eyebrow">DFD Supply</p>
          <h1>Restock Inventory</h1>
          <p class="subtitle">Add stock back into main inventory using item selection or scanned codes.</p>
        </div>
        <nav class="top-nav">
          <a href="/index.html">Main Page</a>
          <a href="/inventory.html">Inventory Actions</a>
          <a href="/search.html">Search Page</a>
        </nav>
      </header>

      <main class="layout">
        <section class="panel stack">
          <h2>Restock inventory</h2>
          <form id="restock-form" class="stack compact">
            <label>Item<select name="itemId" id="restock-item"></select></label>
            <label>Or scan/code<input name="code" /></label>
            <div class="inline-actions">
              <button type="button" id="restock-scan-barcode" class="secondary">Scan barcode</button>
              <button type="button" id="restock-scan-qr" class="secondary">Scan QR code</button>
            </div>
            <label>Quantity<input name="quantity" type="number" min="1" value="1" required /></label>
            <label>Changed by<input name="performedBy" required placeholder="Name" /></label>
            <label>Note<input name="note" /></label>
            <button type="submit">Restock inventory</button>
          </form>
        </section>

        <section class="panel stack wide">
          <h2>Recent changes</h2>
          <div id="transaction-list" class="stack compact"></div>
        </section>
      </main>
    </div>
    <div id="toast"></div>
    <script type="module" src="/app.js"></script>
  </body>
</html>

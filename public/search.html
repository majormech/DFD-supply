<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DFD Supply Inventory · Search & Usage</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body data-page="search">
    <div class="shell">
      <header class="hero">
        <div>
          <p class="eyebrow">DFD Supply</p>
          <h1>Search, Usage & Cost Tracking</h1>
          <p class="subtitle">Analyze usage by item, station, and total cost over time.</p>
        </div>
        <nav class="top-nav">
          <a href="/index.html">Main Page</a>
          <a href="/search.html">Search Page</a>
        </nav>
      </header>

      <section class="panel stack wide">
        <label>Time range
          <select id="days-select">
            <option value="30">Last 30 days</option>
            <option value="60">Last 60 days</option>
            <option value="90">Last 90 days</option>
            <option value="180">Last 180 days</option>
          </select>
        </label>
      </section>

      <main class="layout">
        <section class="panel stack">
          <h2>Usage by item</h2>
          <div class="table-wrap"><table><thead><tr><th>Item</th><th>Qty Used</th><th>Cost Used</th></tr></thead><tbody id="by-item"></tbody></table></div>
        </section>
        <section class="panel stack">
          <h2>Usage by station</h2>
          <div class="table-wrap"><table><thead><tr><th>Station</th><th>Qty Used</th><th>Cost Used</th></tr></thead><tbody id="by-station"></tbody></table></div>
        </section>
        <section class="panel stack wide">
          <h2>Daily trend</h2>
          <div id="trend-bars"></div>
        </section>
      </main>
    </div>
    <script type="module" src="/app.js"></script>
  </body>
</html>

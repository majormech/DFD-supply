<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DFD Supply Inventory · Inventory Actions</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body data-page="inventory">
    <div class="shell">
      <header class="hero">
        <div>
          <p class="eyebrow">DFD Supply</p>
         <h1>Inventory Add Actions</h1>
          <p class="subtitle">Create new inventory items with barcodes, QR codes, quantities, and costs.</p>
        </div>
        <nav class="top-nav">
          <a href="/index.html">Main Page</a>
          <a href="/search.html">Search Page</a>
          <a href="/restock.html">Restock Page</a>
          <a href="/issue.html">Issue Page</a>
        </nav>
      </header>

      <main class="layout">
        <section class="panel stack">
          <h2>Add new inventory item</h2>
          <form id="add-item-form" class="stack compact">
            <label>Item name<input name="name" required /></label>
            <label>SKU<input name="sku" required /></label>
             <label>Barcodes (comma separated)<input name="barcodes" placeholder="Scan or type multiple barcodes, separated by commas" /></label>
            <label>QR code<input name="qrCode" /></label>
            <label>Description<input name="description" /></label>
            <label>Opening quantity<input name="totalQuantity" type="number" min="0" value="0" /></label>
            <label>Unit cost ($)<input name="unitCost" type="number" min="0" step="0.01" value="0" /></label>
            <button type="submit">Add item</button>
          </form>
        </section>

        <section class="panel stack wide">
          <h2>Recent changes</h2>
          <div id="transaction-list" class="stack compact"></div>
        </section>
      </main>
    </div>
    <div id="toast"></div>
    <script type="module" src="/app.js"></script>
  </body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DFD Admin</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body data-page="admin">
    <div class="shell slim">
      <section class="panel stack wide">
        <h1>Admin Settings</h1>
        <p class="subtitle">Configure supply officer email and admin email list.</p>
        <label>Admin key (if configured in worker)
          <input id="admin-key" placeholder="Enter admin key" />
        </label>
        <form id="admin-settings-form" class="stack compact">
          <label>Supply officer email<input name="supplyOfficerEmail" type="email" /></label>
          <label>Admin emails (comma separated)<input name="adminEmails" /></label>
          <button type="submit">Save settings</button>
        </form>
      </section>
      <section class="panel stack wide">
        <div class="admin-error-header">
          <div>
            <h2>Error Log</h2>
            <p class="subtitle">API errors saved by the app.</p>
          </div>
          <button type="button" class="secondary" id="refresh-errors">Refresh errors</button>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Time</th>
                <th>Status</th>
                <th>Route</th>
                <th>Error</th>
                <th>Source</th>
              </tr>
            </thead>
            <tbody id="error-log-body">
              <tr><td colspan="5" class="helper">Loading errors...</td></tr>
            </tbody>
          </table>
        </div>
      </section>
    </div>
    <div id="toast"></div>
    <script type="module" src="/app.js"></script>
  </body>
</html>
